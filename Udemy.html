<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Navigation Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
    padding:20px;
}

/* Top Banner */
.top-banner{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(135deg,#10b981,#34d399);
    color:#fff;
    padding:12px 25px;
    border-radius:50px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    z-index:1000;
    text-align:center;
    max-width:90%;
}

/* Card */
.card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.95);
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    margin-bottom:25px;
    color:#222;
}

/* Buttons */
.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    color:#fff;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    position:relative;
}

.btn:hover,
.btn:focus{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.btn-one{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
}

.btn-two{
    background:linear-gradient(135deg,#10b981,#34d399);
}

.btn-three{
    background:linear-gradient(135deg,#f97316,#fb923c);
}

.loading{
    pointer-events:none;
    opacity:.9;
}

.loading::after{
    content:"";
    width:18px;
    height:18px;
    border:3px solid rgba(255,255,255,.4);
    border-top-color:#fff;
    border-radius:50%;
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:translateY(-50%) rotate(360deg);
    }
}

.message{
    margin-top:15px;
    min-height:20px;
    color:red;
    font-size:.9rem;
}

@media(max-width:480px){
    .card{
        padding:25px;
    }

    h1{
        font-size:1.5rem;
    }
}
</style>
</head>
<body>

<div class="top-banner">
    Your payment (₹699) is completed. Enjoy your free courses from Udemy.
</div>


<div class="card">
    <h1>Click below </h1>

    <div class="buttons">
        <button class="btn btn-one" data-url="https://www.udemy.com/course/leadership-excellence-upskilling-high-potential-managers/?couponCode=PAPAHR_JUN_199976">
            Course One
        </button>

        <button class="btn btn-two" data-url="https://www.udemy.com/share/109TuG3@voVGMBOomvIZx4MY9qEWza1Vwb5kFh3UYlW8T2QSI9Zu2cD5-sC2OgdVLOH9P1KHzg==/">
            Course Two
        </button>

        <button class="btn btn-three" data-url="https://www.udemy.com/share/10e2Sn3@zs8RKap_KY_TdEVTIg7KEdwlR3pfZYFzBwP3eOWtqRVYfJK5LKHAOYqJwP7k-L1ksQ==/">
            Course Three
        </button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
const buttons = document.querySelectorAll(".btn");
const message = document.getElementById("message");

function validURL(url){
    try{
        new URL(url);
        return true;
    }catch{
        return false;
    }
}

buttons.forEach(button=>{
    button.addEventListener("click",function(){

        const url = this.dataset.url;
        message.textContent = "";

        if(!validURL(url)){
            message.textContent = "Invalid URL.";
            return;
        }

        this.classList.add("loading");

        setTimeout(()=>{
            window.open(url,"_blank","noopener,noreferrer");
            this.classList.remove("loading");
        },700);
    });
});

/* Disable right click */
document.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

/* Block common inspection shortcuts */
document.addEventListener("keydown",function(e){

    // F12
    if(e.key === "F12"){
        e.preventDefault();
    }

    // Ctrl+U
    if(e.ctrlKey && e.key.toLowerCase() === "u"){
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i"){
        e.preventDefault();
    }

    // Ctrl+Shift+J
    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "j"){
        e.preventDefault();
    }

    // Ctrl+Shift+C
    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "c"){
        e.preventDefault();
    }
});
</script>

</body>
</html>
